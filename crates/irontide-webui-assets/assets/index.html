<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IronTide</title>
  <script>
    // M234 FOUC prevention — resolve theme before stylesheets paint.
    (function () {
      try {
        var mode = window.localStorage.getItem('irontide.webui.theme') || 'auto';
        var theme = (mode === 'dark' || mode === 'light')
          ? mode
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_e) { /* keep default data-theme="dark" */ }
    })();
  </script>
  <link rel="stylesheet" href="/webui/static/css/pico.min.css">
  <link rel="stylesheet" href="/webui/static/css/tokens.css">
  <link rel="stylesheet" href="/webui/static/css/app.css">
</head>
<body>
  <header class="container-fluid">
    <h1><a href="/" class="nav-brand">IronTide</a></h1>
    <nav>
      <a href="/" class="nav-link nav-link-active">Torrents</a>
      <a href="/webui/preferences" class="nav-link">Preferences</a>
      <button type="button" id="theme-toggle" class="theme-toggle"
              aria-label="Toggle light/dark theme"
              onclick="window.irontideTheme && window.irontideTheme.toggle()">
        <span class="theme-toggle-icon-dark" aria-hidden="true">☾</span>
        <span class="theme-toggle-icon-light" aria-hidden="true">☀</span>
      </button>
      <button onclick="document.getElementById('add-torrent-dialog').showModal()">
        Add Torrent
      </button>
    </nav>
  </header>

  <main class="container-fluid sidebar-layout">
    <aside id="sidebar" aria-label="Filter sidebar">
      <div class="sidebar-header">
        <h2>Filters</h2>
        <button type="button" id="clear-filters" onclick="clearAllFilters()">Clear</button>
      </div>
      <div id="sidebar-sections">
        <p class="sidebar-loading">Loading...</p>
      </div>
    </aside>
    <div id="torrent-list"
         hx-get="/webui/fragments/torrent-list"
         hx-trigger="load, every 2s, refreshList from:body"
         hx-swap="innerHTML">
      <p>Loading...</p>
    </div>
  </main>

  <footer class="container-fluid">
    <div id="stats-bar">
      <span id="stat-active">Active: —</span>
      <span id="stat-down">↓ —</span>
      <span id="stat-up">↑ —</span>
      <span id="stat-ratio">Ratio: —</span>
    </div>
  </footer>

  <!-- Add Torrent Dialog: File / URL / Magnet -->
  <dialog id="add-torrent-dialog">
    <article>
      <header>
        <button
          aria-label="Close"
          rel="prev"
          onclick="this.closest('dialog').close()">
        </button>
        <p>Add Torrent</p>
      </header>
      <div class="add-torrent-tabs" role="tablist" aria-label="Add torrent source">
        <button
          type="button"
          role="tab"
          id="add-tab-file"
          class="add-torrent-tab add-torrent-tab-active"
          aria-controls="add-panel-file"
          aria-selected="true"
          onclick="switchAddTab('file')">File</button>
        <button
          type="button"
          role="tab"
          id="add-tab-url"
          class="add-torrent-tab"
          aria-controls="add-panel-url"
          aria-selected="false"
          onclick="switchAddTab('url')">URL</button>
        <button
          type="button"
          role="tab"
          id="add-tab-magnet"
          class="add-torrent-tab"
          aria-controls="add-panel-magnet"
          aria-selected="false"
          onclick="switchAddTab('magnet')">Magnet</button>
      </div>

      <form
        id="add-panel-file"
        class="add-torrent-panel"
        role="tabpanel"
        aria-labelledby="add-tab-file"
        enctype="multipart/form-data"
        hx-encoding="multipart/form-data"
        hx-post="/webui/add-file"
        hx-target="#add-torrent-error"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) { this.closest('dialog').close(); this.reset(); }">
        <input
          type="file"
          name="torrents"
          accept=".torrent,application/x-bittorrent"
          required
          autocomplete="off">
        <button type="submit">Add Torrent</button>
      </form>

      <form
        id="add-panel-url"
        class="add-torrent-panel add-torrent-panel-hidden"
        role="tabpanel"
        aria-labelledby="add-tab-url"
        hidden
        hx-post="/webui/add-url"
        hx-target="#add-torrent-error"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) { this.closest('dialog').close(); this.reset(); }">
        <input
          type="url"
          name="url"
          placeholder="https://example.com/file.torrent"
          required
          autocomplete="off">
        <button type="submit">Fetch &amp; Add</button>
      </form>

      <form
        id="add-panel-magnet"
        class="add-torrent-panel add-torrent-panel-hidden"
        role="tabpanel"
        aria-labelledby="add-tab-magnet"
        hidden
        hx-post="/webui/add-magnet"
        hx-target="#add-torrent-error"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) { this.closest('dialog').close(); this.reset(); }">
        <input
          type="text"
          name="uri"
          placeholder="magnet:?xt=urn:btih:..."
          required
          autocomplete="off">
        <button type="submit">Add Magnet</button>
      </form>

      <div id="add-torrent-error" aria-live="polite"></div>
    </article>
  </dialog>

  <!-- Toast notifications -->
  <div id="toast" aria-live="polite"></div>

  <script src="/webui/static/js/theme.js"></script>
  <script src="/webui/static/js/htmx.min.js"></script>
  <script src="/webui/static/js/ws-live.js"></script>
  <script src="/webui/static/js/col-resize.js"></script>
  <script src="/webui/static/js/sidebar.js"></script>
  <script>
    // Show a toast message
    function showToast(message, durationMs) {
      var duration = durationMs || 3000;
      var toast = document.getElementById('toast');
      var msg = document.createElement('div');
      msg.className = 'toast-message';
      msg.textContent = message;
      toast.appendChild(msg);
      setTimeout(function () {
        msg.classList.add('fade-out');
        setTimeout(function () { msg.remove(); }, 500);
      }, duration);
    }

    // Listen for HTMX refreshList event to show a success toast
    document.body.addEventListener('refreshList', function () {
      showToast('Torrent added successfully.');
    });

    // Switch the active tab in #add-torrent-dialog (file / url / magnet).
    // Clears the shared error fragment so a 422 from one tab doesn't bleed
    // into the next; focuses the first input in the newly-active panel.
    function switchAddTab(name) {
      var tabs = ['file', 'url', 'magnet'];
      tabs.forEach(function (t) {
        var tab = document.getElementById('add-tab-' + t);
        var panel = document.getElementById('add-panel-' + t);
        var active = (t === name);
        tab.classList.toggle('add-torrent-tab-active', active);
        tab.setAttribute('aria-selected', active ? 'true' : 'false');
        panel.classList.toggle('add-torrent-panel-hidden', !active);
        if (active) { panel.removeAttribute('hidden'); }
        else { panel.setAttribute('hidden', ''); }
      });
      document.getElementById('add-torrent-error').innerHTML = '';
      var activePanel = document.getElementById('add-panel-' + name);
      var firstInput = activePanel.querySelector('input');
      if (firstInput) { firstInput.focus(); }
    }
  </script>
</body>
</html>
