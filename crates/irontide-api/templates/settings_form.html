<form hx-patch="/webui/settings"
      hx-target="#settings-status"
      hx-swap="innerHTML">
  <fieldset>
    <legend>Network</legend>
    <label>
      Listen port
      <input type="number" name="listen_port" min="0" max="65535"
             value="{{ listen_port }}">
    </label>
    <label>
      Enable DHT
      <input type="checkbox" name="enable_dht" role="switch"
             {% if enable_dht %}checked{% endif %}>
    </label>
    <label>
      Enable Peer Exchange
      <input type="checkbox" name="enable_pex" role="switch"
             {% if enable_pex %}checked{% endif %}>
    </label>
    <label>
      Enable LSD
      <input type="checkbox" name="enable_lsd" role="switch"
             {% if enable_lsd %}checked{% endif %}>
    </label>
  </fieldset>

  <fieldset>
    <legend>Storage</legend>
    <label>
      Download directory
      <input type="text" name="download_dir" value="{{ download_dir }}">
    </label>
  </fieldset>

  <fieldset>
    <legend>Limits</legend>
    <label>
      Max torrents (total)
      <input type="number" name="max_torrents" min="1"
             value="{{ max_torrents }}">
    </label>
    <label>
      Max peers per torrent
      <input type="number" name="max_peers_per_torrent" min="1"
             value="{{ max_peers_per_torrent }}">
    </label>
    <label>
      Download rate limit (bytes/s, 0 = unlimited)
      <input type="number" name="download_rate_limit" min="0"
             value="{{ download_rate_limit }}">
    </label>
    <label>
      Upload rate limit (bytes/s, 0 = unlimited)
      <input type="number" name="upload_rate_limit" min="0"
             value="{{ upload_rate_limit }}">
    </label>
    <label>
      Active downloads (-1 = unlimited)
      <input type="number" name="active_downloads" min="-1"
             value="{{ active_downloads }}">
    </label>
    <label>
      Active seeds (-1 = unlimited)
      <input type="number" name="active_seeds" min="-1"
             value="{{ active_seeds }}">
    </label>
  </fieldset>

  <button type="submit">Save settings</button>
  <div id="settings-status" aria-live="polite"></div>
</form>
